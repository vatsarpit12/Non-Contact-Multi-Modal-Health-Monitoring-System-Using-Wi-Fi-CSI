{% extends "base.html" %}

{% block title %}Add Patient - Health Monitoring System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-user-plus me-2"></i>Add New Patient
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name *</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="age" class="form-label">Age *</label>
                        <input type="number" class="form-control" id="age" name="age" min="0" max="150" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="conditions" class="form-label">Medical Conditions</label>
                        <textarea class="form-control" id="conditions" name="conditions" rows="3" 
                                  placeholder="Enter any medical conditions, separated by semicolons (e.g., Hypertension; Diabetes)"></textarea>
                        <div class="form-text">Separate multiple conditions with semicolons (;)</div>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('patients') }}" class="btn btn-secondary me-md-2">
                            <i class="fas fa-times me-1"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Create Patient
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
