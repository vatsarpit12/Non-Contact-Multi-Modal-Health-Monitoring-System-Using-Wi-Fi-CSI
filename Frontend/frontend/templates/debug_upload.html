<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Upload - Health Monitoring System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Debug Upload Test</h2>
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Upload Test</h5>
                    </div>
                    <div class="card-body">
                        <form id="uploadForm" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="patient_id" class="form-label">Patient ID</label>
                                <select class="form-select" id="patient_id" name="patient_id" required>
                                    <option value="">Select Patient</option>
                                    <option value="1">Patient 1</option>
                                    <option value="2">Patient 2</option>
                                    <option value="3">Patient 3</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="device_id" class="form-label">Device ID</label>
                                <input type="text" class="form-control" id="device_id" name="device_id" placeholder="Leave empty for 'web_upload'">
                            </div>
                            <div class="mb-3">
                                <label for="file" class="form-label">File</label>
                                <input type="file" class="form-control" id="file" name="file" accept=".json" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Upload</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Console Output</h5>
                    </div>
                    <div class="card-body">
                        <pre id="consoleOutput" style="height: 300px; overflow-y: auto; background: #f8f9fa; padding: 10px;"></pre>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Recent Recordings</h5>
                    </div>
                    <div class="card-body">
                        <div id="recordingsList">Loading...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Console logging function
        function log(message) {
            const output = document.getElementById('consoleOutput');
            const timestamp = new Date().toLocaleTimeString();
            output.textContent += `[${timestamp}] ${message}\n`;
            output.scrollTop = output.scrollHeight;
            console.log(message);
        }

        // Load recordings
        async function loadRecordings() {
            try {
                log('Loading recordings...');
                const response = await fetch('/api/v1/recordings');
                const recordings = await response.json();
                
                const recordingsList = document.getElementById('recordingsList');
                recordingsList.innerHTML = recordings.map(recording => `
                    <div class="card mb-2">
                        <div class="card-body">
                            <h6>Recording #${recording.id}</h6>
                            <p class="mb-1"><strong>Patient:</strong> ${recording.patient.name} (ID: ${recording.patient_id})</p>
                            <p class="mb-1"><strong>Device:</strong> ${recording.device_id}</p>
                            <p class="mb-1"><strong>Status:</strong> ${recording.processed ? 'Processed' : 'Pending'}</p>
                            <p class="mb-0"><strong>Uploaded:</strong> ${new Date(recording.timestamp).toLocaleString()}</p>
                        </div>
                    </div>
                `).join('');
                
                log(`Loaded ${recordings.length} recordings`);
            } catch (error) {
                log(`Error loading recordings: ${error.message}`);
            }
        }

        // Upload form handler
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const patientId = formData.get('patient_id');
            const deviceId = formData.get('device_id') || 'web_upload';
            const file = formData.get('file');
            
            log(`Starting upload: Patient ${patientId}, Device: ${deviceId}, File: ${file.name}`);
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    log('Upload successful! Redirecting...');
                    // Reload recordings after a short delay
                    setTimeout(loadRecordings, 1000);
                } else {
                    log(`Upload failed with status: ${response.status}`);
                    const text = await response.text();
                    log(`Response: ${text}`);
                }
            } catch (error) {
                log(`Upload error: ${error.message}`);
            }
        });

        // Load recordings on page load
        loadRecordings();
    </script>
</body>
</html>
